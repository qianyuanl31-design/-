“伤口不用再处理了，明天可以拆掉。”

他说完，准备离开。

很正常的流程。

没有多余一句话。

……

凉蝶看着他的背影。

本该结束了。

她的任务也只是确认——这个人是否异常。

到这里，已经足够。

她开口。

声音比她预想的要轻一点。

清念洋停下脚步，回头。

“还有事？”

凉蝶盯着他。

她知道自己在做什么。

这是最基本的操作。

……

“如果伤口重新裂开呢？”

她问。

语气平稳，理由合理。

没有破绽。

清念洋看了她一眼。

那一眼不深，却停得比刚才久了一点。

“那就再来。”他说。

很简单的回答。

没有关心。

没有多余的温度。

甚至不像是在刻意留人。

……

她只是轻轻“嗯”了一声。

然后低下头。

可现在，她却在想。

他会不会真的记得她。

她自己先愣住了。

var content3 = `
夜色沉沉，医院长廊安静得只剩下空调运转的低鸣。

病房的门没有完全关严，留出一条细细的缝。

凉蝶站在门后，侧耳听了两秒，确认走廊另一端的护士推车已经拐过转角，这才抬手，将输液管上的胶带轻轻揭开。

动作极稳，连塑料摩擦的细响都被压到了最低。

她拔下针头，随手用棉签按住针口，白皙的手背上只留下一个几乎看不见的小红点。

病号服外披着件宽大的外套，袖口垂下来，恰好遮住手腕。

门被她推开一道恰到好处的宽度。

她没有立刻出去，而是先看向左侧，再扫过右边，视线短暂却精准，像在无声地测量每一个监控死角。

下一秒，她迈出房门。

脚步很轻，鞋底落在地砖上几乎没有声音。

经过护士站时，她自然地低了低头，淡蓝色的发丝滑落下来，遮住那双过于醒目的白色眼睛。

她没有贴墙，也没有刻意躲闪。

真正训练有素的人，从来不会让自己看起来像是在躲避什么。

电梯太慢，也太显眼。

凉蝶选择了安全通道。

推门时，她只用两根手指压住门把，避免发出金属碰撞声。

门缝打开，她侧身而入，动作流畅得像一缕无声掠过的风。

楼梯间的感应灯逐层亮起。

她单手扶着扶手，步伐不急不缓，却在转角时本能地停顿半秒，先观察下层情况，再继续往下。

像是一种刻进骨子里的习惯。

直到走出住院部侧门，夜风迎面吹来，带着些微凉意。

凉蝶抬起头，长长吐出一口气。

医院里浓重的消毒水味终于散去，取而代之的是草木与雨后泥土混杂的清气。

她站在台阶上，微微眯起眼。

像一只终于离开笼子的蝶。

“这么熟练。”

身后忽然传来一道温和的男声。

凉蝶的身体几不可察地绷紧了一瞬。

她转过身。

清念洋站在不远处，白大褂被夜风吹得微微扬起，手里还拿着刚写完的病历本。

黄橙色的眼睛静静看着她，带着一点若有若无的笑意。

“第一次逃院的人，”他慢条斯理地说，“通常不会知道安全通道的监控死角在哪里。”

空气安静了一秒。

凉蝶眨了眨眼，神情恢复得滴水不漏。

“可能是我比较聪明。”

清念洋看了她片刻，像是在判断她这句话里到底有几分认真。

最后，他只是轻轻合上病历本。

“散步可以。”

他说。

“但病人至少该告诉医生一声。”

他顿了顿，视线落在她还贴着棉签的手背上。

“尤其是刚拔完针的病人。”

// 🌙 夜间模式
function toggleDark() {
    document.body.classList.toggle("dark");
}

// ===== 第一章 =====
var i = 0;

function typeWriter() {
    if (i < content.length) {
        document.getElementById("text").textContent += content[i];
        i++;
        setTimeout(typeWriter, 20);
    }
}

// ===== 第二章 =====
var j = 0;

function typeWriter2() {
    if (j < content2.length) {
        document.getElementById("chapter2Text").textContent += content2[j];
        j++;
        setTimeout(typeWriter2, 20);
    }
}

// ===== 第三章 =====
var k = 0;

function typeWriter3() {
    if (k < content3.length) {
        document.getElementById("chapter3Text").textContent += content3[k];
        k++;
        setTimeout(typeWriter3, 20);
    }
}

// ===== 跳过动画 =====
function skipTyping() {

    // 第一章
    if (i < content.length) {
        document.getElementById("text").textContent = content;
        i = content.length;
    }

    // 第二章
    if (
        document.getElementById("chapter2").style.display === "block" &&
        j < content2.length
    ) {
        document.getElementById("chapter2Text").textContent = content2;
        j = content2.length;
    }

    // 第三章
    if (
        document.getElementById("chapter3").style.display === "block" &&
        k < content3.length
    ) {
        document.getElementById("chapter3Text").textContent = content3;
        k = content3.length;
    }
}

// ===== 音乐 =====
function playMusic() {
    document.getElementById("musicBox").style.display = "block";
}

function playSong(videoId) {
    var player = document.getElementById("player");
    player.src = "https://www.youtube.com/embed/" 
        + videoId + "?autoplay=1&loop=1&playlist=" + videoId;
}

// ===== 下一章逻辑（重点✨）=====
function showNext() {

    // 👉 先显示第二章
    if (j === 0) {
        document.getElementById("chapter2").style.display = "block";
        typeWriter2();

        document.getElementById("chapter2").scrollIntoView({
            behavior: "smooth"
        });
        return;
    }

    // 👉 再显示第三章
    if (k === 0) {
        document.getElementById("chapter3").style.display = "block";
        typeWriter3();

        document.getElementById("chapter3").scrollIntoView({
            behavior: "smooth"
        });
        return;
    }
}

// 页面加载自动开始第一章
window.onload = function() {
    typeWriter();
};
