<!DOCTYPE html>
<html>
<head>
    <title>千千的落樱🍮 oc世界</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #fff8dc, #fffdf5);
            font-family: "Segoe UI", sans-serif;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top: 120px;
            color: #8b6b2c;
        }

        h1 {
            font-size: 50px;
        }

        p {
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            margin: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            background: #ffe4a1;
            color: #6b4e16;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffd580;
        }

        .sweet {
            position: absolute;
            top: -50px;
            font-size: 22px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>
<!-- 🎵 背景音乐（把这一整段复制到这里） -->
    <iframe
        id="bgMusic"
        width="0"
        height="0"
        src="https://www.youtube.com/embed/zExNDJ1V57o?autoplay=1&loop=1&playlist=zExNDJ1V57o&mute=1"
        frameborder="0"
        allow="autoplay"
    ></iframe>
    
<div class="content">
    <h1>千千与落樱的oc制作室</h1>
    <p>这里是我们写OC文（千千）和画漫画（落樱）的网站！不喜勿喷！❤️</p>
    <p>我们是新人，可能不太会做，请谅解...</p>
    
    <a href="story.html" class="btn">📖 进入小说（千千）</a>
<a href="oc.html" class="btn">🧊角色档案（千千）</a>
<a href="luoying.html" class="btn">🌸 落樱的OC世界</a>
</div>
    
<script>
    function createSweet() {
        const sweet = document.createElement("div");
        sweet.classList.add("sweet");

        const emojis = ["🍬","🍪","🍫"];
        sweet.innerText = emojis[Math.floor(Math.random()*emojis.length)];

        sweet.style.left = Math.random() * window.innerWidth + "px";
        sweet.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(sweet);

        setTimeout(() => {
            sweet.remove();
        }, 8000);
    }

    setInterval(createSweet, 300);
</script>

</body>
</html>
