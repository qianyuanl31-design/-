# 千千的（OC小说）

<!DOCTYPE html>
<html>
<head>
    <title>角色档案</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #dff6ff, #a0d8ef);
            font-family: "Segoe UI", sans-serif;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top: 100px;
            color: #1a3c5a;
        }

        h1 {
            font-size: 40px;
        }

        a {
            color: #1a3c5a;
        }

        /* 雪花 */
        .snow {
            position: absolute;
            top: -50px;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

<div class="content">
    <h1>角色档案 ❄️</h1>
    <p>这里是清念洋与凉蝶的世界</p>

    <a href="index.html">← 返回首页</a>
</div>

<script>
    function createSnow() {
        const snow = document.createElement("div");
        snow.classList.add("snow");

        const emojis = ["❄️","💧"];
        snow.innerText = emojis[Math.floor(Math.random()*emojis.length)];

        snow.style.left = Math.random() * window.innerWidth + "px";
        snow.style.animationDuration = (3 + Math.random() * 5) + "s";

        document.body.appendChild(snow);

        setTimeout(() => {
            snow.remove();
        }, 8000);
    }

    setInterval(createSnow, 300);
</script>

</body>
</html>
