# 千千的（OC小说）

<!DOCTYPE html>
<html>
<head>
    <title>角色档案</title>
    <style>
        body {
            background: linear-gradient(to bottom, #0f1c2e, #1f3a5f);
            color: white;
            font-family: "Segoe UI", sans-serif;
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .name {
            font-size: 24px;
            color: #8ab4ff;
        }

        .info p {
            margin: 8px 0;
        }

        .label {
            color: #8ab4ff;
        }

        .story {
            margin-top: 15px;
            line-height: 1.8;
            opacity: 0.9;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #8ab4ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>角色档案</h1>

    <!-- 凉蝶 -->
    <div class="card">
        <div class="name">凉蝶</div>
        <div class="info">
            <p><span class="label">年龄：</span>？？？</p>
            <p><span class="label">身份：</span>情报组织成员 / 大小姐</p>
            <p><span class="label">外貌：</span>淡蓝发，白色眼瞳</p>
            <p><span class="label">性格：</span>冷静、理性、疏离感强</p>
        </div>
        <div class="story">
            她从不属于任何一方。<br><br>
            在光与影之间，她只是执行命令的人。
        </div>
    </div>

    <!-- 清念洋 -->
    <div class="card">
        <div class="name">清念洋</div>
        <div class="info">
            <p><span class="label">年龄：</span>？？？</p>
            <p><span class="label">身份：</span>（你可以自己设定✨）</p>
            <p><span class="label">外貌：</span>青发，黄橙色眼瞳</p>
            <p><span class="label">性格：</span>温和中带点疏离，内心复杂</p>
        </div>
        <div class="story">
            他总是站在光的一侧，却从未真正融入其中。<br><br>
            有些情绪，他从不说出口。
        </div>
    </div>

    <a href="index.html">← 返回首页</a>
</div>

</body>
</html>
