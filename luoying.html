<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>落樱的OC世界</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #ffeef7, #ffffff);
            font-family: "Segoe UI", sans-serif;
            color: #6b4b63;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 80px 20px;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 55px;
            margin-bottom: 15px;
            color: #d86fa3;
        }

        p {
            font-size: 20px;
            opacity: 0.85;
            margin-bottom: 40px;
        }

        h2 {
            margin-top: 50px;
            color: #c85f95;
        }

        img {
            width: 80%;
            max-width: 700px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-top: 20px;
        }

        .menu {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            margin: 15px;
            padding: 15px 35px;
            border-radius: 30px;
            background: #ffd1e8;
            color: #8b3d66;
            text-decoration: none;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(216,111,163,0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            background: #ffb8da;
        }

        .petal {
            position: fixed;
            top: -50px;
            font-size: 24px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🌸 欢迎来到落樱的OC世界 🌸</h1>
        <p>这里是属于角色与故事的梦幻世界</p>

        <!-- 音乐按钮 -->
        <div class="menu">
            <button onclick="playMusic()" class="btn">🎵 播放BGM</button>
            <iframe id="player" width="0" height="0" frameborder="0" allow="autoplay"> 
            </iframe>
        </div>

        <h2>🗺️ 世界地图</h2>
        <img src="map.jpg" alt="世界地图">

        <h2>✨ 欢迎来到落樱的世界 ✨</h2>
        <p>更多精彩内容正在制作中……</p>
    </div>

   <script>
function playMusic() {
    var player = document.getElementById("player");
    player.src = "https://www.youtube.com/embed/ZvYWvo_Wgzs?autoplay=1&loop=1&playlist=ZvYWvo_Wgzs";
}

function createPetal() {
    var petal = document.createElement("div");
    petal.className = "petal";

    var petals = ["🌸", "🌺", "💮"];
    petal.innerText = petals[Math.floor(Math.random() * petals.length)];

    petal.style.left = Math.random() * window.innerWidth + "px";
    petal.style.animationDuration = (4 + Math.random() * 5) + "s";

    document.body.appendChild(petal);

    setTimeout(function() {
        petal.remove();
    }, 9000);
}

setInterval(createPetal, 350);
</script>

</body>
</html>
